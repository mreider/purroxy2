name: Copy Apple secrets to better-bear

on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Copy secrets
        env:
          GH_TOKEN: ${{ github.token }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID_EMAIL: ${{ secrets.APPLE_ID_EMAIL }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | gh secret set APPLE_CERTIFICATE_BASE64 -R mreider/better-bear
          echo "$APPLE_CERTIFICATE_PASSWORD" | gh secret set APPLE_CERTIFICATE_PASSWORD -R mreider/better-bear
          echo "$APPLE_ID_EMAIL" | gh secret set APPLE_ID_EMAIL -R mreider/better-bear
          echo "$APPLE_ID_PASSWORD" | gh secret set APPLE_ID_PASSWORD -R mreider/better-bear
          echo "$APPLE_TEAM_ID" | gh secret set APPLE_TEAM_ID -R mreider/better-bear
          echo "Done — all 5 Apple secrets copied to mreider/better-bear"
